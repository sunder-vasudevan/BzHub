name: Security Audit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bzhub_web/bzhub_web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bzhub_web/bzhub_web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
